<!doctype html>
<html lang="lv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>R1 Tires — Noliktava</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:oklch(0.968 0.006 255);--surface:#ffffff;--surface-2:oklch(0.983 0.004 255);
  --border:oklch(0.906 0.008 255);--border-2:oklch(0.855 0.01 255);
  --ink:oklch(0.28 0.02 262);--ink-2:oklch(0.5 0.016 262);--ink-3:oklch(0.635 0.012 262);
  --accent:oklch(0.55 0.17 256);--accent-2:oklch(0.485 0.17 256);--accent-soft:oklch(0.955 0.028 256);
  --ok:oklch(0.6 0.13 155);--ok-soft:oklch(0.955 0.045 155);
  --warn:oklch(0.68 0.13 70);--warn-soft:oklch(0.955 0.06 82);
  --danger:oklch(0.57 0.19 25);--danger-soft:oklch(0.955 0.04 25);
  --pad:28px;--gap:18px;--card:22px;--radius:13px;--fs:15px;--spot:50px;--h:44px;--side:240px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:var(--fs);line-height:1.45;color:var(--ink);background:var(--bg);min-height:100vh;display:flex;-webkit-font-smoothing:antialiased;}
a{color:var(--accent);text-decoration:none;}
input,select,button,textarea{font-family:inherit;font-size:inherit;color:inherit;}
input::placeholder{color:oklch(0.72 0.01 262);}
input:focus,select:focus{outline:2px solid oklch(0.55 0.17 256 / 0.35);outline-offset:0;}
button{font-family:'IBM Plex Sans',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:oklch(0.86 0.008 255);border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}
@keyframes r1pop{from{opacity:0;transform:translateY(10px) scale(.985);}to{opacity:1;transform:none;}}
@keyframes r1fade{from{opacity:0;}to{opacity:1;}}
.page{animation:r1fade .25s ease;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.label{font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--ink-3);}
.navbtn{position:relative;display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:transparent;border:0;padding:10px 12px;border-radius:9px;cursor:pointer;color:var(--ink-2);font-weight:500;overflow:hidden;font-size:14px;}
.navbtn.on{color:var(--ink);font-weight:600;}
.navbtn.on::before{content:'';position:absolute;inset:0;background:var(--accent-soft);z-index:0;border-radius:9px;}
.navbtn.on::after{content:'';position:absolute;left:0;top:7px;bottom:7px;width:3px;background:var(--accent);border-radius:0 3px 3px 0;}
.navbtn span{position:relative;z-index:1;}
.chip{height:30px;padding:0 12px;border:0;border-radius:7px;font-weight:500;font-size:12px;cursor:pointer;background:transparent;color:var(--ink-3);}
.chip.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px oklch(0.2 0.02 260 / .12);font-weight:600;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--ink-2);margin-bottom:6px;}
.field input,.field select{width:100%;height:var(--h);padding:0 12px;border:1px solid var(--border-2);border-radius:8px;background:var(--surface);}
.r1-swal{border-radius:16px!important;font-family:'IBM Plex Sans',sans-serif!important;padding:8px 4px!important;box-shadow:0 24px 60px oklch(0.2 0.02 260 / .3)!important;}
.r1-swal .swal2-title{font-size:20px!important;font-weight:600!important;color:var(--ink)!important;}
.r1-swal .swal2-html-container{color:var(--ink-2)!important;font-size:14px!important;}
.r1-btn{height:44px;padding:0 22px;border:0;border-radius:11px;font-weight:600;font-size:15px;cursor:pointer;margin:0 5px;font-family:inherit;}
.r1-btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 2px oklch(0.55 0.17 256 / .3);}
.r1-btn-primary:hover{background:var(--accent-2);}
.r1-btn-ghost{background:var(--surface);color:var(--ink-2);border:1px solid var(--border-2);}
.r1-btn-danger{background:var(--danger);color:#fff;}
.r1-toast{border-radius:12px!important;font-family:'IBM Plex Sans',sans-serif!important;}
.swal2-container{z-index:2000!important;}
.tabrow:hover{background:var(--surface-2);}
/* ===== Responsive / mobile ===== */
#hamburger{display:none;width:40px;height:40px;flex:none;align-items:center;justify-content:center;border:1px solid var(--border-2);background:var(--surface);border-radius:9px;cursor:pointer;font-size:19px;color:var(--ink-2);}
#nav-backdrop{display:none;}
@media(max-width:860px){
  :root{--pad:16px;--gap:14px;--card:16px;}
  body>aside{position:fixed!important;left:0;top:0;bottom:0;height:100vh;z-index:160;transform:translateX(-100%);transition:transform .25s ease;box-shadow:0 0 44px oklch(0.2 0.02 260/.28);}
  body.nav-open>aside{transform:none;}
  #nav-backdrop{position:fixed;inset:0;background:oklch(0.2 0.02 260/.45);z-index:150;}
  body.nav-open #nav-backdrop{display:block;}
  #hamburger{display:inline-flex;}
  #hdr-greet{display:none;}
  main{width:100%;min-width:0;}
  .rrow{flex-direction:column!important;}
  .rside{width:100%!important;}
  .rside .card{position:static!important;}
  .rgrid2,.rgridside,.ragrid{grid-template-columns:1fr!important;}
  .rf3{grid-template-columns:1fr 1fr!important;}
  .rf2{grid-template-columns:1fr!important;}
  .rrow>*,.rgridside>*{min-width:0!important;width:100%!important;max-width:100%!important;}
  .cust-list{max-height:none!important;}
}
@media(max-width:480px){
  .rf3{grid-template-columns:1fr!important;}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside style="width:var(--side);flex:none;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;">
  <div style="display:flex;align-items:center;gap:11px;padding:20px 18px;border-bottom:1px solid var(--border);">
    <div style="width:38px;height:38px;flex:none;border-radius:10px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:16px;">R1</div>
    <div><div style="font-weight:600;font-size:15px;">R1 Tires</div><div style="font-size:11px;color:var(--ink-3);">Riepu noliktava · <span id="buildtag">build 35</span></div></div>
  </div>
  <nav style="padding:14px 12px;display:flex;flex-direction:column;gap:2px;flex:1;">
    <button class="navbtn" data-nav="home"><span>◧&nbsp; Sākums</span></button>
    <button class="navbtn" data-nav="intake"><span>↓&nbsp; Pieņemšana</span></button>
    <button class="navbtn" data-nav="release"><span>↑&nbsp; Izsniegšana</span></button>
    <button class="navbtn" data-nav="pending"><span>◔&nbsp; Sagatavotie <span id="nav-pending-badge" style="display:none;margin-left:auto;font-size:10px;font-weight:700;background:var(--warn);color:#fff;border-radius:9px;padding:1px 7px;"></span></span></button>
    <button class="navbtn" data-nav="spots"><span>⊞&nbsp; Novietnes</span></button>
    <button class="navbtn" data-nav="customers"><span>◉&nbsp; Klienti</span></button>
    <button class="navbtn" data-nav="table"><span>▤&nbsp; Tabula</span></button>
    <button class="navbtn" data-nav="analytics"><span>◫&nbsp; Analītika</span></button>
    <button class="navbtn" data-nav="users" id="nav-users" style="display:none;"><span>◔&nbsp; Lietotāji</span></button>
  </nav>
  <div style="padding:16px 18px;border-top:1px solid var(--border);">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
      <span class="label">Noslodze</span><span class="mono" id="side-cap" style="font-weight:600;font-size:14px;">—%</span>
    </div>
    <div style="height:8px;background:var(--border);border-radius:6px;overflow:hidden;"><div id="side-capbar" style="height:100%;width:0%;background:var(--accent);border-radius:6px;"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink-3);margin-top:6px;"><span id="side-occ">—</span><span id="side-free">—</span></div>
  </div>
</aside>

<!-- MAIN -->
<main style="flex:1;min-width:0;display:flex;flex-direction:column;">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:14px;padding:12px var(--pad);background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40;">
    <div style="display:flex;align-items:center;gap:12px;min-width:0;">
      <button id="hamburger" aria-label="Izvēlne">☰</button>
      <div id="hdr-greet" style="font-size:13px;color:var(--ink-3);font-weight:500;"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button id="btn-changepass" class="chip" style="display:none;background:var(--surface-2);border:1px solid var(--border);color:var(--ink-2);">Mainīt paroli</button>
      <button id="btn-logout" class="chip" style="display:none;background:var(--surface-2);border:1px solid var(--border);color:var(--ink-2);">Iziet</button>
      <div style="text-align:right;"><div id="hdr-name" style="font-weight:600;font-size:13px;"></div><div id="hdr-role" style="font-size:11px;color:var(--ink-3);"></div></div>
      <div id="hdr-init" style="width:34px;height:34px;border-radius:50%;background:var(--accent-soft);color:var(--accent-2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;"></div>
    </div>
  </div>
  <div id="view" style="flex:1;"></div>
</main>
<div id="nav-backdrop"></div>

<div id="modal"></div>
<div id="gate"></div>

<script src="/vendor/sweetalert2.min.js"></script>
<script>
// SweetAlert2 themed to the app (falls back to native if it fails to load)
const hasSwal=typeof Swal!=='undefined';
const R1=hasSwal?Swal.mixin({
  buttonsStyling:false,
  customClass:{popup:'r1-swal',confirmButton:'r1-btn r1-btn-primary',cancelButton:'r1-btn r1-btn-ghost',denyButton:'r1-btn r1-btn-ghost'},
  confirmButtonText:'Labi',cancelButtonText:'Atcelt'
}):null;
const ask=async(opts)=>{ if(!R1){return {isConfirmed:confirm(opts.text||opts.title||'?')}; } return R1.fire({showCancelButton:true,...opts}); };
const toast=(title,icon='success')=>{ if(!R1){return;} Swal.fire({toast:true,position:'top-end',timer:2600,showConfirmButton:false,timerProgressBar:true,icon,title,customClass:{popup:'r1-toast'}}); };
const alertErr=(text)=>{ if(!R1){alert(text);return;} R1.fire({icon:'error',title:'Kļūda',text,showCancelButton:false}); };
</script>
<script>
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])));
const eur=n=>'€'+Number(n).toFixed(2).replace('.',',');

// ---- Auth token + fetch wrapper: attach Bearer to /api calls, catch expiry ----
const TOKEN_KEY='r1_token';
function getToken(){try{return localStorage.getItem(TOKEN_KEY)||'';}catch{return'';}}
function setToken(t){try{if(t)localStorage.setItem(TOKEN_KEY,t);else localStorage.removeItem(TOKEN_KEY);}catch{}}
let _reauth=false;
function handle401(){if(_reauth)return;_reauth=true;setToken('');S.auth=null;showLogin();}
const _origFetch=window.fetch.bind(window);
window.fetch=function(input,init){
  init=init?Object.assign({},init):{};
  const url=typeof input==='string'?input:(input&&input.url)||'';
  const isApi=/^(?:https?:\/\/[^/]+)?\/api(?:\/|\?|$)/.test(url);
  if(isApi){
    const h=new Headers(init.headers||(typeof input==='object'&&input&&input.headers)||{});
    const t=getToken();
    if(t&&!h.has('Authorization'))h.set('Authorization','Bearer '+t);
    init.headers=h;
    if(!init.credentials)init.credentials='same-origin';
  }
  return _origFetch(input,init).then(function(r){
    if(r.status===401&&isApi&&!/\/api\/(login|me)\b/.test(url))handle401();
    return r;
  });
};

const S={screen:'home',role:'staff',auth:null,users:[],usersLoaded:false,stats:null,activity:[],customers:[],selCustomer:0,custQ:'',
  plate:'',looked:false,isNew:false,cust:'',phone:'',t1size:'',t1brand:'',t1qty:'4',t2size:'',t2brand:'',rim:'none',thread:'',history:0,
  smsOpen:false,smsRec:null,selSpot:null,presetSpot:null,spotHist:[],spotHistLoading:false,spotPickOpen:false,
  relQ:'',relResults:[],relLoading:false,relSearched:false,
  table:null,tableLoaded:false,tabQ:'',tabStatus:'active',tabSort:{col:'location',dir:'asc'},
  pending:[],pendingLoaded:false,swapFromId:null,recOpen:false,recData:null,
  recEvents:[],recEventsLoading:false,
  analytics:null,analyticsLoaded:false,anaSeason:'',anaStatus:'',anaCustomer:'',anaRims:''};

const ROLES={staff:{label:'Personāls',name:'Juris Kalniņš'},manager:{label:'Vadītājs',name:'Ilze Ozola'},owner:{label:'Īpašnieks',name:'Mārtiņš Bērze'}};
const initialsOf=n=>String(n||'—').replace(/^SIA\s*/i,'').replace(/["']/g,'').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'—';
const MONTHS=['janvāris','februāris','marts','aprīlis','maijs','jūnijs','jūlijs','augusts','septembris','oktobris','novembris','decembris'];
const DAYS=['Svētdiena','Pirmdiena','Otrdiena','Trešdiena','Ceturtdiena','Piektdiena','Sestdiena'];
const now=new Date();
const dateStr=`${DAYS[now.getDay()]}, ${now.getDate()}. ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
const season=(now.getMonth()+1>=3&&now.getMonth()+1<9?'Pavasaris ':'Rudens ')+now.getFullYear();

const BRANDS=['Michelin','Continental','Nokian','Pirelli','Bridgestone','Goodyear','Hankook','Yokohama','Dunlop','Kumho','Toyo','Falken','Vredestein','Sailun','Nexen','BFGoodrich','Firestone','Sava','Barum','Matador','Fulda','Kleber','Gislaved','Laufenn','Triangle','Linglong'];
const canonBrand=v=>{const t=(v||'').trim();if(!t)return t;const hit=BRANDS.find(b=>b.toLowerCase()===t.toLowerCase());return hit||t.charAt(0).toUpperCase()+t.slice(1);};
// "2255017" -> "225/50/17" while typing
function maskSize(v){const d=String(v||'').replace(/[^0-9]/g,'').slice(0,7);
  if(d.length<=3)return d;
  if(d.length<=5)return d.slice(0,3)+'/'+d.slice(3);
  return d.slice(0,3)+'/'+d.slice(3,5)+'/'+d.slice(5);}

// pricing mirror of the server (design formula)
function price(){const w1=parseInt((S.t1size||'').slice(0,3))||0;const w2=S.t1qty==='2+2'?(parseInt((S.t2size||'').slice(0,3))||0):0;const w=Math.max(w1,w2);const base=w===0?0:w<=215?15:w<=245?20:w<=275?25:30;
  const mult=S.rim==='aluminum'?1.3:S.rim==='steel'?1.2:1.0;
  return {w,base,mult,total:base*mult,cls:w===0?'—':w<=215?'185–215':w<=245?'225–245':w<=275?'255–275':'285+'};}

async function loadStats(){try{S.stats=await(await fetch('/api/stats')).json();}catch{S.stats=null;}paintSidebar();}
async function loadActivity(){try{S.activity=(await(await fetch('/api/activity')).json()).events||[];}catch{S.activity=[];}}
async function loadCustomers(){try{S.customers=(await(await fetch('/api/customers'+(S.custQ?'?q='+encodeURIComponent(S.custQ):''))).json()).customers||[];}catch{S.customers=[];}}

function paintSidebar(){const st=S.stats;if(!st)return;
  const color=st.capPct>=90?'var(--danger)':st.capPct>=75?'var(--warn)':'var(--accent)';
  $('#side-cap').textContent=st.capPct+'%';
  const bar=$('#side-capbar');bar.style.width=st.capPct+'%';bar.style.background=color;
  $('#side-occ').textContent=st.occ+' aizņemtas';$('#side-free').textContent=st.free+' brīvas';}

function paintHeader(){
  // Demo mode (AUTH_DISABLED on the server) returns a "demo" user — hide the
  // auth UI (users, logout, change-password) so it only appears with real login.
  const demo=!!(S.auth&&S.auth.username==='demo');
  const name=S.auth?(S.auth.name||S.auth.username||'—'):'—';
  const role=S.auth&&!demo?(S.auth.role==='admin'?'Administrators':'Personāls'):'';
  const set=(id,v)=>{const el=$(id);if(el)el.textContent=v;};
  const show=(id,on)=>{const el=$(id);if(el)el.style.display=on?'':'none';};
  set('#hdr-name',demo?'':name);set('#hdr-role',role);set('#hdr-init',demo?'':initialsOf(name));
  set('#hdr-greet',(S.auth&&!demo)?('Sveiks, '+String(name).split(' ')[0]+'!'):'');
  show('#nav-users',S.auth&&S.auth.role==='admin'&&!demo);
  show('#btn-logout',!demo&&!!S.auth);show('#btn-changepass',!demo&&!!S.auth);}

function nav(screen){S.screen=screen;S.selSpot=null;
  if(screen==='users'){render();if(!S.usersLoaded)loadUsers().then(()=>{if(S.screen==='users')render();});return;}
  if(screen==='table'){render();if(!S.tableLoaded)loadTable().then(()=>{if(S.screen==='table')render();});return;}
  if(screen==='pending'){render();loadPending().then(()=>{if(S.screen==='pending')render();});return;}
  if(screen==='analytics'){render();loadAnalytics().then(()=>{if(S.screen==='analytics')render();});return;}
  render();}
document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>{document.body.classList.remove('nav-open');if(b.dataset.nav==='intake')resetIntake();nav(b.dataset.nav);}));

function resetIntake(){Object.assign(S,{plate:'',looked:false,isNew:false,cust:'',phone:'',t1size:'',t1brand:'',t1qty:'4',t2size:'',t2brand:'',rim:'none',thread:'',history:0,smsOpen:false,smsRec:null,presetSpot:null,swapFromId:null});}

// ============ RENDER ============
function render(){
  document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('on',b.dataset.nav===S.screen));
  paintHeader();
  const v=$('#view');
  if(S.screen==='home')v.innerHTML=homeHTML();
  else if(S.screen==='intake')v.innerHTML=intakeHTML();
  else if(S.screen==='spots')v.innerHTML=spotsHTML();
  else if(S.screen==='customers')v.innerHTML=customersHTML();
  else if(S.screen==='release')v.innerHTML=releaseHTML();
  else if(S.screen==='pending')v.innerHTML=pendingHTML();
  else if(S.screen==='table')v.innerHTML=tableHTML();
  else if(S.screen==='analytics')v.innerHTML=analyticsHTML();
  else if(S.screen==='users')v.innerHTML=usersHTML();
  bind(v);renderModal();
  if(S.screen==='intake')updateSummary();
}

const actRow=a=>{const isIn=a.type==='in';
  return `<div style="display:grid;grid-template-columns:84px 110px 1fr auto;gap:12px;align-items:center;padding:12px var(--card);border-bottom:1px solid var(--border);">
  <span class="mono" style="font-size:12px;color:var(--ink-3);">${esc((a.t||'').slice(5))}</span>
  <span style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;text-align:center;${isIn?'background:var(--ok-soft);color:var(--ok);':'background:var(--accent-soft);color:var(--accent-2);'}">${isIn?'Pieņemšana':'Izsniegšana'}</span>
  <span style="display:flex;align-items:center;gap:10px;min-width:0;"><span class="mono" style="font-weight:600;font-size:13px;">${esc(a.plate||'—')}</span><span style="color:var(--ink-3);font-size:12px;">→ ${esc(a.loc||'—')}</span></span>
  <span style="font-size:12px;color:var(--ink-2);">R1</span></div>`;};

const contBar=c=>{const pct=c.total?Math.round(c.occ/c.total*100):0;
  const bc=pct>=90?'var(--danger)':pct>=75?'var(--warn)':'var(--accent)';
  return `<div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;"><span style="font-weight:600;">Konteiners ${esc(c.letter)}</span><span class="mono" style="color:var(--ink-3);">${c.occ}/${c.total}</span></div>
  <div style="height:7px;background:var(--border);border-radius:5px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${bc};border-radius:5px;"></div></div></div>`;};

function homeHTML(){const st=S.stats||{occ:'—',total:'—',free:'—',todayIntakes:'—',smsIssued:'—',revenueActive:0,containers:[]};
  const showRev=S.role!=='staff';
  return `<div class="page" style="padding:var(--pad);max-width:1240px;margin:0 auto;">
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:var(--pad);flex-wrap:wrap;gap:12px;">
    <div><h1 style="margin:0;font-size:26px;font-weight:600;letter-spacing:-0.01em;">Pārskats</h1>
    <div style="color:var(--ink-3);font-size:13px;margin-top:4px;">${dateStr} · ${season}</div></div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <button data-act="go-release" style="height:44px;padding:0 18px;background:var(--surface);color:var(--ink);border:1px solid var(--border-2);border-radius:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:9px;">◔ Sagatavot riepas</button>

function spotsHTML(){const st=S.stats||{containers:[],occ:'—',total:'—',capPct:0};
  const isAdmin=S.auth&&S.auth.role==='admin';
  const spotBtn=s=>{const sel=S.selSpot&&S.selSpot.code===s.code;const ring=sel?'outline:2px solid var(--accent);outline-offset:1px;':'';
    const base='position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;height:var(--spot);border-radius:9px;cursor:pointer;border:1px solid;padding:0;';
    const fill=s.occ?(s.blocked?'background:var(--danger-soft);border-color:oklch(0.8 0.06 25);color:var(--danger);':s.reserved?'background:var(--warn-soft);border-color:oklch(0.82 0.08 82);color:var(--warn);':s.hasRims?'background:oklch(0.95 0.04 285);border-color:oklch(0.75 0.12 285);color:oklch(0.45 0.15 285);':'background:var(--surface-2);border-color:var(--border-2);color:var(--ink-2);'):'background:var(--ok-soft);border-color:oklch(0.8 0.08 155);color:var(--ok);';
    const style=base+fill+ring;
    const title=s.occ?(s.blocked?'Bloķēts':(s.plate+' · '+(s.cust||'')+(s.reserved?' · rezervēts':'')+(s.hasRims?' · ar diskiem':''))):'Brīvs';
    return `<button data-spot="${esc(s.code)}" title="${esc(title)}" style="${style}">
      ${s.hasRims&&!s.blocked?'<span title="Ar diskiem" style="position:absolute;top:3px;right:4px;font-size:9px;line-height:1;color:oklch(0.55 0.16 285);">◉</span>':''}
      <span class="mono" style="font-weight:600;font-size:11px;">${esc(s.code)}</span>
      ${s.occ?(s.blocked?'<span style="font-size:9px;opacity:.8;">bloķēts</span>':`<span class="mono" style="font-size:9px;opacity:.8;">${esc(s.plate||'')}</span>`):'<span style="font-size:9px;opacity:.75;">brīvs</span>'}</button>`;};
  return `<div class="page" style="padding:var(--pad);max-width:1240px;margin:0 auto;">
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:var(--pad);flex-wrap:wrap;gap:12px;">
    <div><h1 style="margin:0;font-size:24px;font-weight:600;">Novietnes</h1>
    <div style="color:var(--ink-3);font-size:13px;margin-top:4px;">${st.occ} / ${st.total} aizņemtas · ${st.capPct}% noslodze</div></div>
    ${isAdmin?`<button data-act="add-container" style="height:40px;padding:0 16px;background:var(--accent);color:#fff;border:0;border-radius:10px;font-weight:600;cursor:pointer;">＋ Pievienot konteineru</button>`:''}
  </div>
  <div style="display:flex;gap:14px;font-size:12px;flex-wrap:wrap;margin-bottom:var(--pad);">
      <span style="display:flex;align-items:center;gap:7px;"><span style="width:14px;height:14px;border-radius:4px;background:var(--ok-soft);border:1px solid oklch(0.8 0.08 155);"></span>Brīvs</span>
      <span style="display:flex;align-items:center;gap:7px;"><span style="width:14px;height:14px;border-radius:4px;background:var(--surface-2);border:1px solid var(--border-2);"></span>Aizņemta</span>
      <span style="display:flex;align-items:center;gap:7px;"><span style="width:14px;height:14px;border-radius:4px;background:oklch(0.95 0.04 285);border:1px solid oklch(0.75 0.12 285);"></span>Ar diskiem</span>
      <span style="display:flex;align-items:center;gap:7px;"><span style="width:14px;height:14px;border-radius:4px;background:var(--warn-soft);border:1px solid oklch(0.82 0.08 82);"></span>Rezervēts</span>
      <span style="display:flex;align-items:center;gap:7px;"><span style="width:14px;height:14px;border-radius:4px;background:var(--danger-soft);border:1px solid oklch(0.8 0.06 25);"></span>Bloķēts</span>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:var(--gap);">
    ${(st.containers||[]).map(c=>`<div class="card" style="padding:var(--card);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;">
        <h2 style="margin:0;font-size:15px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Konteiners ${esc(c.letter)}${c.label?` · <span style="font-weight:400;color:var(--ink-3);">${esc(c.label)}</span>`:''}</h2>

      <div style="display:grid;grid-template-columns:repeat(${c.cols||4},1fr);gap:6px;">${c.spots.map(spotBtn).join('')}</div>

// Admin Excel import: dry-run preview (does NOT touch DB) → confirm → real import that REPLACES all data.
function impErr(o,res){return (o&&o.error&&(o.error.message||o.error))||('HTTP '+(res?res.status:'?'));}
async function doImport(file){
  const mkFd=()=>{const fd=new FormData();fd.append('file',file);return fd;};
  let prev,res;
  try{
    R1&&R1.fire({title:'Analizē failu…',html:esc(file.name),allowOutsideClick:false,didOpen:()=>R1.showLoading()});
    res=await fetch('/api/import?dryRun=1',{method:'POST',body:mkFd()});
    prev=await res.json().catch(()=>({}));
    if(!res.ok||!prev.ok)throw new Error(impErr(prev,res));
  }catch(e){R1&&R1.close();alertErr('Neizdevās nolasīt failu: '+(e.message||e));return;}
  const sample=prev.sample||[];
  const cols=[['location','Vieta'],['plate','Nr.'],['makeModel','Auto'],['customerName','Klients'],['size1','Izmērs'],['size2','2.izm.'],['brand','Ražotājs'],['quantity','Sk.'],['season','Sezona']];
  const th=cols.map(c=>`<th style="text-align:left;padding:4px 8px;border-bottom:1px solid #ddd;font-weight:600;white-space:nowrap;">${c[1]}</th>`).join('');
  const trs=sample.map(r=>`<tr>${cols.map(c=>`<td style="padding:3px 8px;border-bottom:1px solid #f0f0f0;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;">${esc(r[c[0]]==null?'':r[c[0]])}</td>`).join('')}</tr>`).join('');
  const html=`<div style="text-align:left;font-size:13px;">
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px;">
      <div><b style="font-size:18px;">${prev.parsed}</b> ieraksti</div>
      <div style="color:#666;"><b>${prev.sheets}</b> sezonu lapas · ${prev.rows} rindas · ${prev.skipped} tukšas</div>
    </div>
    <div style="max-height:260px;overflow:auto;border:1px solid #eee;border-radius:8px;"><table style="border-collapse:collapse;width:100%;font-size:12px;"><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table></div>
    <div style="margin-top:8px;color:#999;font-size:11px;">Rāda pirmos ${sample.length} ierakstus priekšskatam.</div>
    <div style="margin-top:10px;padding:9px 11px;background:#fdecec;color:#b91c1c;border-radius:8px;font-weight:600;">⚠ Šis aizvietos VISUS pašreizējos datus ar šī faila saturu.</div>
  </div>`;
  const r=await ask({icon:'warning',title:'Apstiprināt importu?',html,width:760,confirmButtonText:`Importēt (${prev.parsed})`,confirmButtonColor:'#b91c1c',cancelButtonText:'Atcelt'});
  if(!r.isConfirmed)return;
  try{
    R1&&R1.fire({title:'Importē…',html:'Aizvieto datus',allowOutsideClick:false,didOpen:()=>R1.showLoading()});
    const res2=await fetch('/api/import',{method:'POST',body:mkFd()});
    const out=await res2.json().catch(()=>({}));
    if(!res2.ok||!out.ok)throw new Error(impErr(out,res2));
    R1&&R1.close();
    toast('Importēts: '+(out.imported!=null?out.imported:prev.parsed)+' ieraksti');
    await Promise.all([loadTable(),loadStats()]);updateTabContent();
  }catch(e){R1&&R1.close();alertErr('Imports neizdevās: '+(e.message||e));}
}

function tiresOf(x){const b=canonBrand(x.brand)||'—';const q=x.quantity?String(x.quantity):'';
  const base=((q?q+'× ':'')+b+(x.size?' '+x.size:'')).trim()||'—';

async function loadPending(){try{S.pending=(await(await fetch('/api/pending')).json()).pending||[];}catch{S.pending=[];}S.pendingLoaded=true;paintPendingBadge();}

  if(n>0){b.textContent=n;b.style.display='';}else b.style.display='none';}
function startSwap(id,plate,loc){resetIntake();S.plate=plate||'';S.presetSpot=loc||null;S.swapFromId=id;S.screen='intake';S.selSpot=null;S.recOpen=false;render();doLookup();}
async function recAction(kind){const r=S.recData;if(!r)return;
  if(kind==='edit'){await editRecordDialog(r);return;}
  if(kind==='swap'){S.recOpen=false;renderModal();startSwap(r.id,r.plate,r.location);return;}
  if(kind==='release'){const c=await ask({icon:'question',title:'Izsniegt riepas?',html:`<b class="mono">${esc(r.plate||'')}</b> · vieta ${esc(r.location||'')}`,input:'text',inputPlaceholder:'Komentārs (neobligāts)',confirmButtonText:'Izsniegt'});if(!c.isConfirmed)return;
    await fetch('/api/storage/'+encodeURIComponent(r.id)+'/release',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({comment:c.value||''})});}
  else if(kind==='prepare'){const c=await ask({icon:'question',title:'Sagatavot izsniegšanai?',html:`Vieta <b class="mono">${esc(r.location||'')}</b> paliks rezervēta`,input:'text',inputPlaceholder:'Komentārs (neobligāts)',confirmButtonText:'Sagatavot'});if(!c.isConfirmed)return;
    await fetch('/api/storage/'+encodeURIComponent(r.id)+'/prepare',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({comment:c.value||''})});}
  else if(kind==='terminate'){const c=await ask({icon:'warning',title:'Slēgt bez jaunām riepām?',html:`<b class="mono">${esc(r.plate||'')}</b> — vieta atbrīvosies.`,input:'text',inputPlaceholder:'Komentārs (neobligāts)',confirmButtonText:'Slēgt',cancelButtonText:'Atcelt',customClass:{popup:'r1-swal',confirmButton:'r1-btn r1-btn-danger',cancelButton:'r1-btn r1-btn-ghost'}});if(!c.isConfirmed)return;
    await fetch('/api/storage/'+encodeURIComponent(r.id)+'/release',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({comment:c.value||'Slēgts bez jaunām riepām'})});}
  else if(kind==='unprep'){await fetch('/api/storage/'+encodeURIComponent(r.id)+'/unprepare',{method:'POST'});}
  else if(kind==='unblock'){await fetch('/api/storage/'+encodeURIComponent(r.id)+'/unblock',{method:'POST'});}
  const msgs={release:'Riepas izsniegtas',prepare:'Sagatavots · vieta rezervēta',terminate:'Pasūtījums slēgts',unprep:'Novietots atpakaļ',unblock:'Atbloķēts'};
  S.recOpen=false;toast(msgs[kind]||'Izdarīts');
  await Promise.all([loadTable(),loadStats(),loadPending()]);
  renderModal();render();}

    ['customerName','Klients',r.customerName,''],['phone','Telefons',r.phone,'mono'],

    ['brand','Ražotājs',r.brand,''],['quantity','Daudzums',r.quantity,''],
    ['makeModel','Auto',r.makeModel,''],['rimNote','Diski',r.rimNote,''],
    ['threadDepth','Protektors (mm)',r.threadDepth,'mono'],['season','Sezona',r.season,''],
    ['intakeDate','Saņemts',r.intakeDate,'mono'],['releaseDate','Izsniegts',r.releaseDate,'mono'],
  ];
  const inp=(k,label,val,mono)=>`<div><label class="label" style="display:block;margin-bottom:4px;">${label}</label><input id="ed-${k}" class="swal2-input${mono?' mono':''}" value="${esc(val==null?'':val)}" style="margin:0;width:100%;height:38px;font-size:14px;"></div>`;
  const grid=fields.map(f=>inp(f[0],f[1],f[2],f[3])).join('');
  const {value:form}=await R1.fire({title:'Rediģēt ierakstu',width:640,
    html:`<div style="text-align:left;display:grid;grid-template-columns:1fr 1fr;gap:12px;">${grid}
      <div style="grid-column:1/3;"><label class="label" style="display:block;margin-bottom:4px;">Piezīmes</label><input id="ed-notes" class="swal2-input" value="${esc(tabNotes(r))}" style="margin:0;width:100%;height:38px;font-size:14px;"></div></div>`,
    showCancelButton:true,confirmButtonText:'Saglabāt',cancelButtonText:'Atcelt',
    customClass:{popup:'r1-swal'},
    preConfirm:()=>{const patch={};
      fields.forEach(f=>{patch[f[0]]=document.getElementById('ed-'+f[0]).value;});
      patch.notes=document.getElementById('ed-notes').value;
      return patch;}});
  if(!form)return;
  const res=await fetch('/api/storage/'+encodeURIComponent(r.id),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(form)});
  const data=await res.json().catch(()=>({}));
  if(!res.ok||!data.ok){alertErr(data.error?.message||'Neizdevās saglabāt');return;}
  S.recData=data.record;
  toast('Saglabāts');
  await Promise.all([loadTable(),loadStats(),loadRecEvents(r.id)]);
  renderModal();updateTabContent();}

  try{const d=await(await fetch('/api/vehicle?plate='+encodeURIComponent(plate))).json();
    if(S.selSpot&&S.selSpot.plate===plate)S.spotHist=d.history||[];

// ============ EVENTS ============
function bind(root){
  root.querySelectorAll('[data-act]').forEach(el=>el.addEventListener('click',async()=>{
    const a=el.dataset.act;
    if(a==='new-intake'){resetIntake();nav('intake');}
    else if(a==='go-spots')nav('spots');
    else if(a==='go-customers')nav('customers');
    else if(a==='lookup')await doLookup();
    else if(a==='reset'){resetIntake();render();}
    else if(a==='confirm')await confirmIntake();
    else if(a==='new-user')await newUserDialog();
    else if(a==='go-release')nav('release');
    else if(a==='go-pending')nav('pending');
    else if(a==='rel-search'){const q=document.getElementById('rel-q');S.relQ=q?q.value:S.relQ;await loadRelease();updateReleaseContent();}
    else if(a==='pick-spot'){grab();S.spotPickOpen=true;renderModal();}
    else if(a==='sms-done'){S.smsOpen=false;S.smsRec=null;resetIntake();await Promise.all([loadStats(),loadActivity()]);nav('home');}
    else if(a==='import-xlsx'){const f=document.getElementById('imp-file');if(f)f.click();}
    else if(a==='add-container')await addContainerDialog();
    else if(a==='rec-addcomment')await addRecComment();
    else if(a==='ana-clear'){S.anaSeason='';S.anaStatus='';S.anaCustomer='';S.anaRims='';S.analyticsLoaded=false;render();await loadAnalytics();if(S.screen==='analytics')render();}
  }));
  root.querySelectorAll('[data-evedit]').forEach(el=>el.addEventListener('click',()=>editEventDialog(el.dataset.evedit)));
  root.querySelectorAll('[data-evdel]').forEach(el=>el.addEventListener('click',()=>deleteEventDialog(el.dataset.evdel)));
  const rc=root.querySelector('#rec-comment');
  if(rc)rc.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addRecComment();}});
  root.querySelectorAll('[data-delcont]').forEach(el=>el.addEventListener('click',(e)=>{e.stopPropagation();deleteContainerDialog(el.dataset.delcont,el.dataset.prefix);}));
  const impf=root.querySelector('#imp-file');
  if(impf)impf.addEventListener('change',async()=>{const file=impf.files&&impf.files[0];impf.value='';if(file)await doImport(file);});
  root.querySelectorAll('[data-pickspot]').forEach(el=>el.addEventListener('click',()=>{
    const code=el.dataset.pickspot;S.presetSpot=(code==='__auto__')?null:code;S.spotPickOpen=false;renderModal();render();}));
  root.querySelectorAll('[data-rec]').forEach(el=>el.addEventListener('click',()=>{
    const rec=(S.table||[]).find(x=>String(x.id)===el.dataset.rec);if(rec){S.recData=rec;S.recOpen=true;S.recEvents=[];renderModal();loadRecEvents(rec.id);}}));
  root.querySelectorAll('[data-recact]').forEach(el=>el.addEventListener('click',()=>recAction(el.dataset.recact)));
  root.querySelectorAll('[data-tabstatus]').forEach(el=>el.addEventListener('click',()=>{S.tabStatus=el.dataset.tabstatus;render();}));
  root.querySelectorAll('[data-sort]').forEach(el=>el.addEventListener('click',()=>{const k=el.dataset.sort;
    if(S.tabSort.col===k)S.tabSort.dir=S.tabSort.dir==='asc'?'desc':'asc';else S.tabSort={col:k,dir:'asc'};updateTabContent();}));

// Inline type-ahead: completes the brand IN the field while typing (not a dropdown).
function typeAhead(el,ev){if(ev&&ev.inputType&&ev.inputType.startsWith('delete'))return;
  const v=el.value;if(!v)return;
  const hit=BRANDS.find(b=>b.toLowerCase().startsWith(v.toLowerCase()));
  if(hit&&hit!==v){const keep=v.length;el.value=hit;el.setSelectionRange(keep,hit.length);}}

  if(id==='in-size'||id==='in-size2'){const m=maskSize(e.target.value);if(m!==e.target.value){e.target.value=m;e.target.setSelectionRange(m.length,m.length);}}
  if(id==='in-brand'||id==='in-brand2')typeAhead(e.target,e);
  if(id==='in-plate'){const v=e.target.value;clearTimeout(_plateT);_plateT=setTimeout(()=>plateSuggest(v),140);}

function renderPlateSuggest(){
  const box=document.getElementById('plate-suggest');if(!box)return;
  if(!_plateItems.length){box.style.display='none';box.innerHTML='';return;}
  box.innerHTML=`<div style="background:var(--surface);border:1px solid var(--border-2);border-radius:10px;box-shadow:0 12px 30px oklch(0.2 0.02 260 / .2);overflow:hidden;max-height:300px;overflow-y:auto;">`+

function pickPlate(i){const s=_plateItems[i];if(!s)return;const inp=document.getElementById('in-plate');if(inp)inp.value=s.plate;S.plate=s.plate;_plateItems=[];_plateHi=-1;renderPlateSuggest();doLookup();}
async function plateSuggest(q){
  q=(q||'').trim();
  if(q.replace(/\s/g,'').length<2){_plateItems=[];_plateHi=-1;renderPlateSuggest();return;}
  try{const d=await(await fetch('/api/plate-suggest?q='+encodeURIComponent(q))).json();
    if((document.getElementById('in-plate')||{}).value!==undefined){_plateItems=d.suggestions||[];_plateHi=-1;renderPlateSuggest();}
  }catch{_plateItems=[];renderPlateSuggest();}}
function hidePlateSuggest(){_plateItems=[];_plateHi=-1;renderPlateSuggest();}

async function doLookup(){grab();hidePlateSuggest();
  const plate=(S.plate||'').toUpperCase().replace(/\s/g,'');
  if(!plate)return;
  S.plate=plate;
  try{const d=await(await fetch('/api/lookup?plate='+encodeURIComponent(plate))).json();
    if(d.found){const s=d.suggestion||{};
      Object.assign(S,{looked:true,isNew:false,cust:s.customerName||'—',phone:s.phone||'',history:d.history,
        t1size:s.size1||S.t1size,t1brand:s.brand||S.t1brand,
        t1qty:(String(s.quantity||'')==='2+2'?'2+2':(String(s.quantity||'').match(/^\d$/)?String(s.quantity):S.t1qty)),t2size:s.size2||'',
        rim:/alum|liet/i.test(s.rimNote||'')?'aluminum':/tērau|terau|dzelz/i.test(s.rimNote||'')?'steel':S.rim});
    } else Object.assign(S,{looked:true,isNew:true,cust:'',phone:'',history:0});
  }catch{Object.assign(S,{looked:true,isNew:true,cust:'',history:0});}
  render();}

// Strong random password from an unambiguous alphabet (no 0/O, 1/l/I).
function genPassword(len){len=len||12;
  const U='ABCDEFGHJKLMNPQRSTUVWXYZ',L='abcdefghijkmnopqrstuvwxyz',D='23456789',SY='!@#$%*?-_';
  const all=U+L+D+SY;
  const rnd=n=>{const a=new Uint32Array(1);crypto.getRandomValues(a);return a[0]%n;};
  const out=[U[rnd(U.length)],L[rnd(L.length)],D[rnd(D.length)],SY[rnd(SY.length)]];
  while(out.length<len)out.push(all[rnd(all.length)]);
  for(let i=out.length-1;i>0;i--){const j=rnd(i+1);const t=out[i];out[i]=out[j];out[j]=t;}
  return out.join('');}

function slugUser(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'').slice(0,20);}

    html:`<div style="text-align:left;">
      <div style="color:var(--ink-3);font-size:13px;margin-bottom:12px;">Nokopē un nodod lietotājam. Parole vairs netiks rādīta.</div>
      <div style="display:flex;justify-content:space-between;gap:10px;padding:11px 13px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;margin-bottom:8px;"><span style="color:var(--ink-3);font-size:13px;">Lietotājs</span><span class="mono" style="font-weight:600;">${esc(username)}</span></div>
      <div style="display:flex;justify-content:space-between;gap:10px;padding:11px 13px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;"><span style="color:var(--ink-3);font-size:13px;">Parole</span><span class="mono" style="font-weight:600;">${esc(password)}</span></div></div>`,
    showCancelButton:true,confirmButtonText:'📋 Kopēt',cancelButtonText:'Aizvērt',
    preConfirm:async()=>{await copyText(username+' / '+password);return true;}});
  if(r.isConfirmed)toast('Pieejas dati nokopēti');}

async function newUserDialog(){
  if(!R1)return;
  const {value:form}=await R1.fire({title:'Jauns lietotājs',width:470,
    html:`<div style="text-align:left;display:flex;flex-direction:column;gap:12px;">
      <div><label class="label" style="display:block;margin-bottom:5px;">Vārds</label><input id="nu-name" class="swal2-input" placeholder="Jānis Bērziņš" style="margin:0;width:100%;"></div>
      <div><label class="label" style="display:block;margin-bottom:5px;">Lietotājvārds</label><input id="nu-user" class="swal2-input mono" placeholder="janis" autocapitalize="none" autocorrect="off" style="margin:0;width:100%;"></div>
      <div><label class="label" style="display:block;margin-bottom:5px;">Loma</label><select id="nu-role" class="swal2-input" style="margin:0;width:100%;"><option value="staff">Personāls</option><option value="admin">Administrators</option></select></div>
      <div><label class="label" style="display:block;margin-bottom:5px;">Parole</label>${passRow('nu-pass')}</div>
    </div>`,
    showCancelButton:true,confirmButtonText:'Izveidot',cancelButtonText:'Atcelt',
    didOpen:()=>{wireGen('nu-pass');document.getElementById('nu-pass').value=genPassword(12);
      const nm=document.getElementById('nu-name'),us=document.getElementById('nu-user');
      nm.addEventListener('input',()=>{if(!us.dataset.touched)us.value=slugUser(nm.value);});
      us.addEventListener('input',()=>{us.dataset.touched='1';});},
    preConfirm:()=>{const name=document.getElementById('nu-name').value.trim();
      const username=document.getElementById('nu-user').value.trim().toLowerCase();
      const role=document.getElementById('nu-role').value;const password=document.getElementById('nu-pass').value;
      if(!name){Swal.showValidationMessage('Ievadi vārdu');return false;}
      if(!/^[a-z0-9._-]{3,32}$/.test(username)){Swal.showValidationMessage('Lietotājvārds: 3–32 rakstzīmes (a–z, 0–9, . _ -)');return false;}
      if(password.length<8){Swal.showValidationMessage('Parolei jābūt vismaz 8 rakstzīmes');return false;}
      return {name,username,role,password};}});
  if(!form)return;
  const res=await fetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(form)});
  const data=await res.json().catch(()=>({}));
  if(!res.ok){alertErr(data.error?.message||'Neizdevās izveidot lietotāju');return;}
  await loadUsers();render();
  await showCredentials('Lietotājs izveidots',form.username,form.password);}

async function resetUserDialog(username,name){
  if(!R1)return;
  const {value:form}=await R1.fire({title:'Atiestatīt paroli',width:460,
    html:`<div style="text-align:left;">
      <div style="color:var(--ink-3);font-size:13px;margin-bottom:12px;">Lietotājs <b class="mono">@${esc(username)}</b>${name?' · '+esc(name):''}</div>
      <label class="label" style="display:block;margin-bottom:5px;">Jaunā parole</label>${passRow('ru-pass')}</div>`,
    showCancelButton:true,confirmButtonText:'Atiestatīt',cancelButtonText:'Atcelt',
    didOpen:()=>{wireGen('ru-pass');document.getElementById('ru-pass').value=genPassword(12);},
    preConfirm:()=>{const p=document.getElementById('ru-pass').value;if(p.length<8){Swal.showValidationMessage('Parolei jābūt vismaz 8 rakstzīmes');return false;}return {password:p};}});
  if(!form)return;
  const res=await fetch('/api/users/'+encodeURIComponent(username)+'/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:form.password})});
  const data=await res.json().catch(()=>({}));
  if(!res.ok){alertErr(data.error?.message||'Neizdevās atiestatīt paroli');return;}
  await showCredentials('Parole atiestatīta',username,form.password);}

async function deleteUserDialog(username,name){
  const r=await ask({icon:'warning',title:'Dzēst lietotāju?',html:`<b class="mono">@${esc(username)}</b>${name?' · '+esc(name):''} vairs nevarēs pieteikties.`,confirmButtonText:'Dzēst',cancelButtonText:'Atcelt',customClass:{popup:'r1-swal',confirmButton:'r1-btn r1-btn-danger',cancelButton:'r1-btn r1-btn-ghost'}});
  if(!r.isConfirmed)return;
  const res=await fetch('/api/users/'+encodeURIComponent(username),{method:'DELETE'});
  const data=await res.json().catch(()=>({}));
  if(!res.ok){alertErr(data.error?.message||'Neizdevās dzēst');return;}
  await loadUsers();render();toast('Lietotājs dzēsts');}

async function changePasswordDialog(){
  if(!R1)return;
  const {value:form}=await R1.fire({title:'Mainīt savu paroli',width:460,
    html:`<div style="text-align:left;display:flex;flex-direction:column;gap:12px;">
      <div><label class="label" style="display:block;margin-bottom:5px;">Pašreizējā parole</label><input id="cp-old" type="password" class="swal2-input" style="margin:0;width:100%;"></div>
      <div><label class="label" style="display:block;margin-bottom:5px;">Jaunā parole</label>${passRow('cp-new')}</div>
    </div>`,
    showCancelButton:true,confirmButtonText:'Saglabāt',cancelButtonText:'Atcelt',
    didOpen:()=>{wireGen('cp-new');},
    preConfirm:()=>{const oldp=document.getElementById('cp-old').value;const newp=document.getElementById('cp-new').value;
      if(!oldp||!newp){Swal.showValidationMessage('Aizpildi abus laukus');return false;}
      if(newp.length<8){Swal.showValidationMessage('Jaunajai parolei jābūt vismaz 8 rakstzīmes');return false;}
      return {oldp,newp};}});
  if(!form)return;
  const res=await fetch('/api/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({currentPassword:form.oldp,newPassword:form.newp})});
  const data=await res.json().catch(()=>({}));
  if(res.ok)toast('Parole nomainīta');else alertErr(data.error?.message||'Neizdevās nomainīt paroli');}

async function doLogout(){
  const r=await ask({icon:'question',title:'Iziet?',text:'Tiksi izrakstīts no sistēmas.',confirmButtonText:'Iziet',cancelButtonText:'Palikt'});
  if(!r.isConfirmed)return;
  try{await fetch('/api/logout',{method:'POST'});}catch{}
  setToken('');S.auth=null;S.users=[];S.usersLoaded=false;S.screen='home';
  showLogin();}

function loginHTML(){
  return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);">
    <div style="width:100%;max-width:380px;">
      <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:26px;">
        <div style="width:56px;height:56px;border-radius:15px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:22px;margin-bottom:14px;">R1</div>
        <h1 style="margin:0;font-size:22px;font-weight:600;">R1 Tires</h1>
        <div style="color:var(--ink-3);font-size:13px;margin-top:4px;">Piesakies, lai turpinātu</div>
      </div>
      <div class="card" style="padding:24px;">
        <div class="field" style="margin-bottom:14px;"><label>Lietotājvārds</label><input id="lg-user" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="lietotajvards" style="height:46px;"></div>
        <div class="field" style="margin-bottom:18px;"><label>Parole</label><input id="lg-pass" type="password" autocomplete="current-password" placeholder="••••••••" style="height:46px;"></div>
        <button id="lg-submit" style="width:100%;height:46px;background:var(--accent);color:#fff;border:0;border-radius:11px;font-weight:600;font-size:15px;cursor:pointer;box-shadow:0 1px 2px oklch(0.55 0.17 256 / .3);">Pieteikties</button>
        <div id="lg-err" style="color:var(--danger);font-size:13px;text-align:center;margin-top:12px;min-height:16px;"></div>
        <button id="lg-forgot" style="width:100%;background:transparent;border:0;color:var(--ink-3);font-size:13px;cursor:pointer;margin-top:2px;">Aizmirsi paroli?</button>
      </div>
    </div></div>`;}

function showLogin(){
  document.body.style.overflow='hidden';
  const g=$('#gate');
  g.style.cssText='position:fixed;inset:0;z-index:200;background:var(--bg);overflow:auto;';
  g.innerHTML=loginHTML();
  const user=$('#lg-user'),pass=$('#lg-pass'),err=$('#lg-err');
  const submit=async()=>{err.textContent='';
    const u=(user.value||'').trim(),p=pass.value||'';
    if(!u||!p){err.textContent='Ievadi lietotājvārdu un paroli';return;}
    try{const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
      const data=await res.json().catch(()=>({}));
      if(!res.ok){err.textContent=data.error?.message||'Neizdevās pieteikties';return;}
      setToken(data.token||'');S.auth=data.user;_reauth=false;
      hideLogin();await startApp();
    }catch(e){err.textContent='Savienojuma kļūda';}};
  $('#lg-submit').addEventListener('click',submit);
  pass.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
  user.addEventListener('keydown',e=>{if(e.key==='Enter')pass.focus();});
  $('#lg-forgot').addEventListener('click',()=>ask({icon:'info',title:'Aizmirsi paroli?',html:'Sazinies ar administratoru, lai atiestatītu paroli.<br><span style="color:var(--ink-3);font-size:13px;">Administrators to izdara sadaļā <b>Lietotāji → Atiestatīt paroli</b>.</span>',showCancelButton:false,confirmButtonText:'Sapratu'}));
  setTimeout(()=>{try{user.focus();}catch{}},60);}
function hideLogin(){const g=$('#gate');if(g){g.innerHTML='';g.style.cssText='';}document.body.style.overflow='';}

async function startApp(){
  S.role=(S.auth&&S.auth.role==='admin')?'owner':'staff';
  paintHeader();render();
  await Promise.all([loadStats(),loadActivity(),loadCustomers(),loadPending()]);
  render();}

// ============ INIT ============
function bindTopbar(){
  const lo=$('#btn-logout');if(lo)lo.addEventListener('click',doLogout);
  const cp=$('#btn-changepass');if(cp)cp.addEventListener('click',changePasswordDialog);
  const hb=$('#hamburger');if(hb)hb.addEventListener('click',()=>document.body.classList.toggle('nav-open'));
  const bd=$('#nav-backdrop');if(bd)bd.addEventListener('click',()=>document.body.classList.remove('nav-open'));}
(async function(){
  bindTopbar();
  try{
    const res=await fetch('/api/me');
    if(res.ok){const d=await res.json();S.auth=d.user;hideLogin();await startApp();}
    else showLogin();
  }catch{showLogin();}
})();
</script>
</body>
</html>
