<!doctype html>
<html lang="lv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>R1 Tires — Noliktava</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:oklch(0.968 0.006 255);--surface:#ffffff;--surface-2:oklch(0.983 0.004 255);
  --border:oklch(0.906 0.008 255);--border-2:oklch(0.855 0.01 255);
  --ink:oklch(0.28 0.02 262);--ink-2:oklch(0.5 0.016 262);--ink-3:oklch(0.635 0.012 262);
  --accent:oklch(0.55 0.17 256);--accent-2:oklch(0.485 0.17 256);--accent-soft:oklch(0.955 0.028 256);
  --ok:oklch(0.6 0.13 155);--ok-soft:oklch(0.955 0.045 155);
  --warn:oklch(0.68 0.13 70);--warn-soft:oklch(0.955 0.06 82);
  --danger:oklch(0.57 0.19 25);--danger-soft:oklch(0.955 0.04 25);
  --pad:28px;--gap:18px;--card:22px;--radius:13px;--fs:15px;--spot:50px;--h:44px;--side:240px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:var(--fs);line-height:1.45;color:var(--ink);background:var(--bg);min-height:100vh;display:flex;-webkit-font-smoothing:antialiased;}
a{color:var(--accent);text-decoration:none;}
input,select,button,textarea{font-family:inherit;font-size:inherit;color:inherit;}
input::placeholder{color:oklch(0.72 0.01 262);}
input:focus,select:focus{outline:2px solid oklch(0.55 0.17 256 / 0.35);outline-offset:0;}
button{font-family:'IBM Plex Sans',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:oklch(0.86 0.008 255);border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}
@keyframes r1pop{from{opacity:0;transform:translateY(10px) scale(.985);}to{opacity:1;transform:none;}}
@keyframes r1fade{from{opacity:0;}to{opacity:1;}}
.page{animation:r1fade .25s ease;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.label{font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--ink-3);}
.navbtn{position:relative;display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:transparent;border:0;padding:10px 12px;border-radius:9px;cursor:pointer;color:var(--ink-2);font-weight:500;overflow:hidden;font-size:14px;}
.navbtn.on{color:var(--ink);font-weight:600;}
.navbtn.on::before{content:'';position:absolute;inset:0;background:var(--accent-soft);z-index:0;border-radius:9px;}
.navbtn.on::after{content:'';position:absolute;left:0;top:7px;bottom:7px;width:3px;background:var(--accent);border-radius:0 3px 3px 0;}
.navbtn span{position:relative;z-index:1;}
.chip{height:30px;padding:0 12px;border:0;border-radius:7px;font-weight:500;font-size:12px;cursor:pointer;background:transparent;color:var(--ink-3);}
.chip.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px oklch(0.2 0.02 260 / .12);font-weight:600;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--ink-2);margin-bottom:6px;}
.field input,.field select{width:100%;height:var(--h);padding:0 12px;border:1px solid var(--border-2);border-radius:8px;background:var(--surface);}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside style="width:var(--side);flex:none;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;">
  <div style="display:flex;align-items:center;gap:11px;padding:20px 18px;border-bottom:1px solid var(--border);">
    <div style="width:38px;height:38px;flex:none;border-radius:10px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:16px;">R1</div>
    <div><div style="font-weight:600;font-size:15px;">R1 Tires</div><div style="font-size:11px;color:var(--ink-3);">Riepu noliktava · <span id="buildtag">build 15</span></div></div>
  </div>
  <nav style="padding:14px 12px;display:flex;flex-direction:column;gap:2px;flex:1;">
    <button class="navbtn" data-nav="home"><span>◧&nbsp; Sākums</span></button>
    <button class="navbtn" data-nav="intake"><span>↓&nbsp; Pieņemšana</span></button>
    <button class="navbtn" data-nav="spots"><span>⊞&nbsp; Novietnes</span></button>
    <button class="navbtn" data-nav="customers"><span>◉&nbsp; Klienti</span></button>
  </nav>
  <div style="padding:16px 18px;border-top:1px solid var(--border);">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
      <span class="label">Noslodze</span><span class="mono" id="side-cap" style="font-weight:600;font-size:14px;">—%</span>
    </div>
    <div style="height:8px;background:var(--border);border-radius:6px;overflow:hidden;"><div id="side-capbar" style="height:100%;width:0%;background:var(--accent);border-radius:6px;"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink-3);margin-top:6px;"><span id="side-occ">—</span><span id="side-free">—</span></div>
  </div>
</aside>

<!-- MAIN -->
<main style="flex:1;min-width:0;display:flex;flex-direction:column;">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:14px;padding:12px var(--pad);background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40;">
    <div style="display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px;">
      <button class="chip" data-role="staff">Personāls</button>
      <button class="chip" data-role="manager">Vadītājs</button>
      <button class="chip" data-role="owner">Īpašnieks</button>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="text-align:right;"><div id="hdr-name" style="font-weight:600;font-size:13px;"></div><div id="hdr-role" style="font-size:11px;color:var(--ink-3);"></div></div>
      <div id="hdr-init" style="width:34px;height:34px;border-radius:50%;background:var(--accent-soft);color:var(--accent-2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;"></div>
    </div>
  </div>
  <div id="view" style="flex:1;"></div>
</main>

<div id="modal"></div>

<script>
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])));
const eur=n=>'€'+Number(n).toFixed(2).replace('.',',');

const S={screen:'home',role:'staff',stats:null,activity:[],customers:[],selCustomer:0,custQ:'',
  plate:'',looked:false,isNew:false,cust:'',phone:'',t1size:'',t1brand:'',t1qty:'4',t2size:'',t2brand:'',rim:'none',thread:'',history:0,
  smsOpen:false,smsRec:null,selSpot:null,presetSpot:null};

const ROLES={staff:{label:'Personāls',name:'Juris Kalniņš'},manager:{label:'Vadītājs',name:'Ilze Ozola'},owner:{label:'Īpašnieks',name:'Mārtiņš Bērze'}};
const initialsOf=n=>String(n||'—').replace(/^SIA\s*/i,'').replace(/["']/g,'').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'—';
const MONTHS=['janvāris','februāris','marts','aprīlis','maijs','jūnijs','jūlijs','augusts','septembris','oktobris','novembris','decembris'];
const DAYS=['Svētdiena','Pirmdiena','Otrdiena','Trešdiena','Ceturtdiena','Piektdiena','Sestdiena'];
const now=new Date();
const dateStr=`${DAYS[now.getDay()]}, ${now.getDate()}. ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
const season=(now.getMonth()+1>=3&&now.getMonth()+1<9?'Pavasaris ':'Rudens ')+now.getFullYear();

const BRANDS=['Michelin','Continental','Nokian','Pirelli','Bridgestone','Goodyear','Hankook','Yokohama','Dunlop','Kumho','Toyo','Falken','Vredestein','Sailun','Nexen','BFGoodrich','Firestone','Sava','Barum','Matador','Fulda','Kleber','Gislaved','Laufenn','Triangle','Linglong'];
const canonBrand=v=>{const t=(v||'').trim();if(!t)return t;const hit=BRANDS.find(b=>b.toLowerCase()===t.toLowerCase());return hit||t.charAt(0).toUpperCase()+t.slice(1);};
// "2255017" -> "225/50/17" while typing
function maskSize(v){const d=String(v||'').replace(/[^0-9]/g,'').slice(0,7);
  if(d.length<=3)return d;
  if(d.length<=5)return d.slice(0,3)+'/'+d.slice(3);
  return d.slice(0,3)+'/'+d.slice(3,5)+'/'+d.slice(5);}

// pricing mirror of the server (design formula)
function price(){const w1=parseInt((S.t1size||'').slice(0,3))||0;const w2=S.t1qty==='2+2'?(parseInt((S.t2size||'').slice(0,3))||0):0;const w=Math.max(w1,w2);const base=w===0?0:w<=215?15:w<=245?20:w<=275?25:30;
  const mult=S.rim==='aluminum'?1.3:S.rim==='steel'?1.2:1.0;
  return {w,base,mult,total:base*mult,cls:w===0?'—':w<=215?'185–215':w<=245?'225–245':w<=275?'255–275':'285+'};}

async function loadStats(){try{S.stats=await(await fetch('/api/stats')).json();}catch{S.stats=null;}paintSidebar();}
async function loadActivity(){try{S.activity=(await(await fetch('/api/activity')).json()).events||[];}catch{S.activity=[];}}
async function loadCustomers(){try{S.customers=(await(await fetch('/api/customers'+(S.custQ?'?q='+encodeURIComponent(S.custQ):''))).json()).customers||[];}catch{S.customers=[];}}

function paintSidebar(){const st=S.stats;if(!st)return;
  const color=st.capPct>=90?'var(--danger)':st.capPct>=75?'var(--warn)':'var(--accent)';
  $('#side-cap').textContent=st.capPct+'%';
  const bar=$('#side-capbar');bar.style.width=st.capPct+'%';bar.style.background=color;
  $('#side-occ').textContent=st.occ+' aizņemtas';$('#side-free').textContent=st.free+' brīvas';}

function paintHeader(){const r=ROLES[S.role];
  document.querySelectorAll('[data-role]').forEach(b=>b.classList.toggle('on',b.dataset.role===S.role));
  $('#hdr-name').textContent=r.name;$('#hdr-role').textContent=r.label;$('#hdr-init').textContent=initialsOf(r.name);}

function nav(screen){S.screen=screen;S.selSpot=null;render();}
document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>{if(b.dataset.nav==='intake')resetIntake();nav(b.dataset.nav);}));
document.querySelectorAll('[data-role]').forEach(b=>b.addEventListener('click',()=>{S.role=b.dataset.role;paintHeader();if(S.screen==='home')render();}));

function resetIntake(){Object.assign(S,{plate:'',looked:false,isNew:false,cust:'',phone:'',t1size:'',t1brand:'',t1qty:'4',t2size:'',t2brand:'',rim:'none',thread:'',history:0,smsOpen:false,smsRec:null,presetSpot:null});}

// ============ RENDER ============
function render(){
  document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('on',b.dataset.nav===S.screen));
  paintHeader();
  const v=$('#view');
  if(S.screen==='home')v.innerHTML=homeHTML();
  else if(S.screen==='intake')v.innerHTML=intakeHTML();
  else if(S.screen==='spots')v.innerHTML=spotsHTML();
  else if(S.screen==='customers')v.innerHTML=customersHTML();
  bind(v);renderModal();
}

const actRow=a=>{const isIn=a.type==='in';
  return `<div style="display:grid;grid-template-columns:84px 110px 1fr auto;gap:12px;align-items:center;padding:12px var(--card);border-bottom:1px solid var(--border);">
  <span class="mono" style="font-size:12px;color:var(--ink-3);">${esc((a.t||'').slice(5))}</span>
  <span style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;text-align:center;${isIn?'background:var(--ok-soft);color:var(--ok);':'background:var(--accent-soft);color:var(--accent-2);'}">${isIn?'Pieņemšana':'Izsniegšana'}</span>
  <span style="display:flex;align-items:center;gap:10px;min-width:0;"><span class="mono" style="font-weight:600;font-size:13px;">${esc(a.plate||'—')}</span><span style="color:var(--ink-3);font-size:12px;">→ ${esc(a.loc||'—')}</span></span>
  <span style="font-size:12px;color:var(--ink-2);">R1</span></div>`;};

const contBar=c=>{const pct=c.total?Math.round(c.occ/c.total*100):0;
  const bc=pct>=90?'var(--danger)':pct>=75?'var(--warn)':'var(--accent)';
  return `<div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;"><span style="font-weight:600;">Konteiners ${esc(c.letter)}</span><span class="mono" style="color:var(--ink-3);">${c.occ}/${c.total}</span></div>
  <div style="height:7px;background:var(--border);border-radius:5px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${bc};border-radius:5px;"></div></div></div>`;};

function homeHTML(){const st=S.stats||{occ:'—',total:'—',free:'—',todayIntakes:'—',smsIssued:'—',revenueActive:0,containers:[]};
  const showRev=S.role!=='staff';
  return `<div class="page" style="padding:var(--pad);max-width:1240px;margin:0 auto;">
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:var(--pad);flex-wrap:wrap;gap:12px;">
    <div><h1 style="margin:0;font-size:26px;font-weight:600;letter-spacing:-0.01em;">Pārskats</h1>
    <div style="color:var(--ink-3);font-size:13px;margin-top:4px;">${dateStr} · ${season}</div></div>
    <button data-act="new-intake" style="height:44px;padding:0 20px;background:var(--accent);color:#fff;border:0;border-radius:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:9px;box-shadow:0 1px 2px oklch(0.55 0.17 256 / .3);">＋ Jauna pieņemšana</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--gap);margin-bottom:var(--gap);">
    <div class="card" style="padding:var(--card);"><div class="label">Aizņemtas vietas</div><div class="mono" style="font-size:30px;font-weight:600;margin-top:8px;">${st.occ}<span style="font-size:16px;color:var(--ink-3);">/${st.total}</span></div></div>
    <div class="card" style="padding:var(--card);"><div class="label">Brīvas vietas</div><div class="mono" style="font-size:30px;font-weight:600;margin-top:8px;color:var(--ok);">${st.free}</div></div>
    <div class="card" style="padding:var(--card);"><div class="label">Šodien pieņemtas</div><div class="mono" style="font-size:30px;font-weight:600;margin-top:8px;">${st.todayIntakes}</div></div>
    <div class="card" style="padding:var(--card);"><div class="label">SMS kodi izsniegti</div><div class="mono" style="font-size:30px;font-weight:600;margin-top:8px;">${st.smsIssued}</div></div>
    ${showRev?`<div class="card" style="padding:var(--card);"><div class="label">Ieņēmumi (aktīvie)</div><div class="mono" style="font-size:30px;font-weight:600;margin-top:8px;">${eur(st.revenueActive||0)}</div></div>`:''}
  </div>
  <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:var(--gap);align-items:start;">
    <div class="card" style="overflow:hidden;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px var(--card);border-bottom:1px solid var(--border);">
        <h2 style="margin:0;font-size:15px;font-weight:600;">Nesenās darbības</h2><span style="font-size:12px;color:var(--ink-3);">pēdējās</span></div>
      <div>${S.activity.map(actRow).join('')||'<div style="padding:20px;color:var(--ink-3);font-size:13px;">Nav darbību</div>'}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:var(--gap);">
      <div class="card" style="padding:var(--card);">
        <h2 style="margin:0 0 14px;font-size:15px;font-weight:600;">Ātrās darbības</h2>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <button data-act="new-intake" style="height:42px;padding:0 14px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:9px;font-weight:500;cursor:pointer;text-align:left;">↓&nbsp; Pieņemt riepas</button>
          <button data-act="go-spots" style="height:42px;padding:0 14px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:9px;font-weight:500;cursor:pointer;text-align:left;">⊞&nbsp; Izsniegt pēc koda</button>
          <button data-act="go-customers" style="height:42px;padding:0 14px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:9px;font-weight:500;cursor:pointer;text-align:left;">◷&nbsp; Izsniegt pēc numura</button>
        </div>
      </div>
      <div class="card" style="padding:var(--card);">
        <h2 style="margin:0 0 14px;font-size:15px;font-weight:600;">Konteineru noslodze</h2>
        <div style="display:flex;flex-direction:column;gap:12px;">${(st.containers||[]).map(contBar).join('')}</div>
      </div>
    </div>
  </div></div>`;}

function intakeHTML(){const p=price();
  const canConfirm=S.looked&&!!S.t1size&&!!S.thread&&(!S.isNew||!!(S.cust&&S.cust.trim()))&&(S.t1qty!=='2+2'||!!S.t2size);
  const rimBtn=(key,label,pos)=>{const on=S.rim===key;
    const rad=pos===0?'border-radius:8px 0 0 8px;':pos===2?'border-radius:0 8px 8px 0;border-left:0;':'border-left:0;';
    return `<button data-rim="${key}" style="height:var(--h);flex:1;border:1px solid var(--border-2);cursor:pointer;font-weight:500;font-size:13px;${on?'background:var(--accent);color:#fff;border-color:var(--accent);':'background:var(--surface);color:var(--ink-2);'}${rad}">${label}</button>`;};
  const banner=!S.looked?'':S.isNew?`<div style="margin-top:14px;padding:14px;border-radius:10px;background:var(--warn-soft);border:1px solid oklch(0.82 0.08 82);">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <span style="font-size:10px;font-weight:700;letter-spacing:.05em;padding:3px 8px;border-radius:6px;color:#fff;background:var(--warn);">JAUNS</span>
      <span style="font-weight:600;">Jauns klients — ievadi datus</span>
    </div>
    <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:10px;">
      <div class="field"><label>Vārds / uzņēmums *</label><input id="in-cust" value="${esc(S.cust)}" placeholder="Anna Ozola / SIA Serviss" style="background:var(--surface);"></div>
      <div class="field"><label>Telefons</label><input id="in-phone" class="mono" value="${esc(S.phone)}" placeholder="29123456" style="background:var(--surface);"></div>
    </div></div>`:`<div style="margin-top:14px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 14px;border-radius:10px;background:var(--ok-soft);border:1px solid oklch(0.8 0.08 155);">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:10px;font-weight:700;letter-spacing:.05em;padding:3px 8px;border-radius:6px;color:#fff;background:var(--ok);">ATRASTS</span>
      <div><div style="font-weight:600;">${esc(S.cust)}</div><div class="mono" style="font-size:12px;color:var(--ink-3);">${esc(S.phone||'—')}</div></div>
    </div><span style="font-size:12px;color:var(--ok);font-weight:600;">Iepriekšējie dati aizpildīti ✓ (${S.history} ieraksti)</span></div>`;
  const spot=S.presetSpot||(S.stats&&S.stats.assignNext)||'—';
  return `<div class="page" style="padding:var(--pad);max-width:1180px;margin:0 auto;">
  <div style="margin-bottom:var(--pad);"><h1 style="margin:0;font-size:24px;font-weight:600;">Riepu pieņemšana</h1>
  <div style="color:var(--ink-3);font-size:13px;margin-top:4px;">${season} · vieta tiek piešķirta automātiski</div></div>
  <div style="display:flex;gap:var(--gap);align-items:flex-start;">
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:var(--gap);">
      <div class="card" style="padding:var(--card);">
        <div class="label" style="margin-bottom:6px;">1 · Numura zīme</div>
        <div style="display:flex;gap:10px;">
          <input id="in-plate" value="${esc(S.plate)}" placeholder="AB1234" style="flex:1;height:52px;padding:0 16px;border:2px solid var(--border-2);border-radius:10px;background:var(--surface);font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:22px;letter-spacing:0.06em;text-transform:uppercase;">
          <button data-act="lookup" style="height:52px;padding:0 22px;background:var(--accent);color:#fff;border:0;border-radius:10px;font-weight:600;font-size:15px;cursor:pointer;">⌕ Meklēt</button>
        </div>${banner}
      </div>
      <div class="card" style="padding:var(--card);">
        <div class="label" style="margin-bottom:14px;">2 · Riepu dati</div>
        <div style="display:grid;grid-template-columns:1.2fr 1.4fr 0.8fr;gap:12px;margin-bottom:14px;">
          <div class="field"><label>Izmērs</label><input id="in-size" class="mono" inputmode="numeric" value="${esc(S.t1size)}" placeholder="235/50/19"></div>
          <div class="field"><label>Ražotājs</label><input id="in-brand" value="${esc(S.t1brand)}" placeholder="Michelin" autocomplete="off"></div>

function spotsHTML(){const st=S.stats||{containers:[],occ:'—',total:'—',capPct:0};
  const spotBtn=s=>{const sel=S.selSpot&&S.selSpot.code===s.code;const ring=sel?'outline:2px solid var(--accent);outline-offset:1px;':'';

    const style=s.occ?base+'background:var(--surface-2);border-color:var(--border-2);color:var(--ink-2);'+ring:base+'background:var(--ok-soft);border-color:oklch(0.8 0.08 155);color:var(--ok);'+ring;
    return `<button data-spot="${esc(s.code)}" title="${esc(s.occ?(s.plate+' · '+(s.cust||'')):'Brīva vieta')}" style="${style}">
      <span class="mono" style="font-weight:600;font-size:11px;">${esc(s.code)}</span>
      ${s.occ?`<span class="mono" style="font-size:9px;opacity:.8;">${esc(s.plate||'')}</span>`:'<span style="font-size:9px;opacity:.75;">brīva</span>'}</button>`;};
  return `<div class="page" style="padding:var(--pad);max-width:1240px;margin:0 auto;">
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:var(--pad);flex-wrap:wrap;gap:12px;">

    <div style="color:var(--ink-3);font-size:13px;margin-top:4px;">${st.occ} / ${st.total} aizņemtas · ${st.capPct}% noslodze</div></div>
    <div style="display:flex;gap:16px;font-size:12px;">
      <span style="display:flex;align-items:center;gap:7px;"><span style="width:14px;height:14px;border-radius:4px;background:var(--ok-soft);border:1px solid oklch(0.8 0.08 155);"></span>Brīva</span>
      <span style="display:flex;align-items:center;gap:7px;"><span style="width:14px;height:14px;border-radius:4px;background:var(--surface-2);border:1px solid var(--border-2);"></span>Aizņemta</span>
    </div></div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:var(--gap);">
    ${(st.containers||[]).map(c=>`<div class="card" style="padding:var(--card);">

        <h2 style="margin:0;font-size:15px;font-weight:600;">Konteiners ${esc(c.letter)}</h2>

    </div>`).join('')}
  </div></div>`;}

          <div><div class="label" style="margin-bottom:4px;">SMS kods</div><div class="mono" style="font-weight:600;">${esc(s.sms||'—')}</div></div>
        </div>
        <button data-release-spot="${esc(s.id)}" style="height:44px;margin-top:8px;background:var(--accent);color:#fff;border:0;border-radius:10px;font-weight:600;cursor:pointer;">Izsniegt riepas</button>
      </div>`:`<div style="margin-top:22px;">
        <p style="color:var(--ink-2);font-size:14px;line-height:1.6;margin:0 0 18px;">Šī vieta ir brīva un gatava jaunai pieņemšanai.</p>
        <button data-assign="${esc(s.code)}" style="width:100%;height:44px;background:var(--accent);color:#fff;border:0;border-radius:10px;font-weight:600;cursor:pointer;">Piešķirt šo vietu</button>
      </div>`}
    </div></div>`;
  } else m.innerHTML='';
  bind(m);
}

// ============ EVENTS ============
function bind(root){
  root.querySelectorAll('[data-act]').forEach(el=>el.addEventListener('click',async()=>{
    const a=el.dataset.act;
    if(a==='new-intake'){resetIntake();nav('intake');}
    else if(a==='go-spots')nav('spots');
    else if(a==='go-customers')nav('customers');
    else if(a==='lookup')await doLookup();
    else if(a==='reset'){resetIntake();render();}
    else if(a==='confirm')await confirmIntake();
    else if(a==='sms-done'){S.smsOpen=false;S.smsRec=null;resetIntake();await Promise.all([loadStats(),loadActivity()]);nav('home');}
  }));
  root.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',e=>{
    if(e.target!==el&&e.target.closest('[data-stop]'))return;
    if(el.dataset.close==='sms'){S.smsOpen=false;S.smsRec=null;}else S.selSpot=null;renderModal();render();
  }));
  root.querySelectorAll('[data-rim]').forEach(el=>el.addEventListener('click',()=>{grab();S.rim=el.dataset.rim;render();}));
  root.querySelectorAll('[data-spot]').forEach(el=>el.addEventListener('click',()=>{
    const code=el.dataset.spot;let found=null;
    for(const c of (S.stats?.containers||[]))for(const s of c.spots)if(s.code===code)found=s;
    S.selSpot=found;renderModal();}));
  root.querySelectorAll('[data-assign]').forEach(el=>el.addEventListener('click',()=>{
    resetIntake();S.presetSpot=el.dataset.assign;S.selSpot=null;nav('intake');}));
  root.querySelectorAll('[data-release-spot]').forEach(el=>el.addEventListener('click',async()=>{
    if(!confirm('Izsniegt riepas no šīs vietas?'))return;
    const sp=S.selSpot||{};
    await fetch('/api/storage/'+encodeURIComponent(el.dataset.releaseSpot)+'/release',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    S.selSpot=null;await Promise.all([loadStats(),loadActivity()]);
    await offerReintake(sp.plate,sp.code);}));
  root.querySelectorAll('[data-release]').forEach(el=>el.addEventListener('click',async()=>{
    if(!confirm('Izsniegt riepas?'))return;
    await fetch('/api/storage/'+encodeURIComponent(el.dataset.release)+'/release',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    await Promise.all([loadStats(),loadCustomers()]);
    await offerReintake(el.dataset.plate,el.dataset.loc);}));
  root.querySelectorAll('[data-cust]').forEach(el=>el.addEventListener('click',()=>{S.selCustomer=Number(el.dataset.cust);render();}));
  const pl=root.querySelector('#in-plate');
  if(pl)pl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doLookup();}});
  const cq=root.querySelector('#cust-q');
  if(cq){let t;cq.addEventListener('input',()=>{clearTimeout(t);t=setTimeout(async()=>{S.custQ=cq.value;S.selCustomer=0;await loadCustomers();render();const n=$('#cust-q');if(n){n.focus();n.setSelectionRange(n.value.length,n.value.length);}},350);});}
}
function grab(){const g=(id,k)=>{const el=$(id);if(el)S[k]=el.value;};
  g('#in-plate','plate');g('#in-size','t1size');g('#in-brand','t1brand');g('#in-qty','t1qty');g('#in-thread','thread');
  g('#in-cust','cust');g('#in-phone','phone');g('#in-size2','t2size');g('#in-brand2','t2brand');
  S.t1size=maskSize(S.t1size)||S.t1size;S.t2size=maskSize(S.t2size)||S.t2size;}
// Live summary WITHOUT re-rendering the page (no flicker while typing).
function tiresLine(){const b1=canonBrand(S.t1brand)||'—';
  if(S.t1qty==='2+2')return S.t1size?('2× '+b1+' '+S.t1size+(S.t2size?' + 2× '+(canonBrand(S.t2brand)||b1)+' '+S.t2size:'')):'—';
  return (S.t1qty&&S.t1size)?(S.t1qty+'× '+b1+' '+S.t1size):'—';}
function updateSummary(){const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  const p=price();
  set('sum-cust',S.looked?(S.cust&&S.cust.trim()?S.cust:(S.isNew?'Jauns klients':'—')):'—');
  set('sum-plate',S.plate?S.plate.toUpperCase():'—');
  set('sum-tires',tiresLine());
  set('sum-thread',S.thread?S.thread+' mm':'—');
  set('sum-cls','('+p.cls+')');set('sum-base',p.w?eur(p.base):'—');
  set('sum-mult','× '+p.mult.toFixed(1));set('sum-total',p.w?eur(p.total):'—');
  const btn=document.getElementById('btn-confirm');
  if(btn){const ok=S.looked&&!!S.t1size&&!!S.thread&&(!S.isNew||!!(S.cust&&S.cust.trim()))&&(S.t1qty!=='2+2'||!!S.t2size);
    btn.disabled=!ok;
    btn.style.cssText='height:46px;margin-top:4px;border:0;border-radius:11px;font-weight:600;font-size:15px;'+(ok?'background:var(--accent);color:#fff;cursor:pointer;box-shadow:0 1px 2px oklch(0.55 0.17 256 / .3);':'background:var(--border);color:var(--ink-3);cursor:not-allowed;');}}
// Inline type-ahead: completes the brand IN the field while typing (not a dropdown).
function typeAhead(el,ev){if(ev&&ev.inputType&&ev.inputType.startsWith('delete'))return;
  const v=el.value;if(!v)return;
  const hit=BRANDS.find(b=>b.toLowerCase().startsWith(v.toLowerCase()));
  if(hit&&hit!==v){const keep=v.length;el.value=hit;el.setSelectionRange(keep,hit.length);}}
document.addEventListener('input',e=>{const id=e.target.id;
  if(id==='in-size'||id==='in-size2'){const m=maskSize(e.target.value);if(m!==e.target.value){e.target.value=m;e.target.setSelectionRange(m.length,m.length);}}
  if(id==='in-brand'||id==='in-brand2')typeAhead(e.target,e);
  if(['in-plate','in-size','in-brand','in-thread','in-cust','in-phone','in-size2','in-brand2','in-qty'].includes(id)){grab();updateSummary();}});
document.addEventListener('change',e=>{if(e.target.id==='in-qty'){grab();render();}});

// After a release, staff usually take in the other season's tires right away.
async function offerReintake(plate,loc){
  if(plate&&confirm('Riepas izsniegtas ✓\n\nPieņemt '+plate+' pretējās sezonas riepas tagad?\n(Vieta '+(loc||'—')+' tikko atbrīvojās un tiks piedāvāta.)')){
    resetIntake();S.plate=plate;S.presetSpot=loc||null;S.screen='intake';render();
    await doLookup();
  } else render();
}

async function doLookup(){grab();
  const plate=(S.plate||'').toUpperCase().replace(/\s/g,'');
  if(!plate)return;
  S.plate=plate;
  try{const d=await(await fetch('/api/lookup?plate='+encodeURIComponent(plate))).json();
    if(d.found){const s=d.suggestion||{};
      Object.assign(S,{looked:true,isNew:false,cust:s.customerName||'—',phone:s.phone||'',history:d.history,
        t1size:s.size1||S.t1size,t1brand:s.brand||S.t1brand,
        t1qty:(String(s.quantity||'')==='2+2'?'2+2':(String(s.quantity||'').match(/^\d$/)?String(s.quantity):S.t1qty)),t2size:s.size2||'',
        rim:/alum|liet/i.test(s.rimNote||'')?'aluminum':/tērau|terau|dzelz/i.test(s.rimNote||'')?'steel':S.rim});
    } else Object.assign(S,{looked:true,isNew:true,cust:'',phone:'',history:0});
  }catch{Object.assign(S,{looked:true,isNew:true,cust:'',history:0});}
  render();}

async function confirmIntake(){grab();
  if(!(S.looked&&S.t1size&&S.thread))return;
  if(!(S.looked&&(!S.isNew||S.cust.trim())))return;
  const is22=S.t1qty==='2+2';
  if(is22&&!S.t2size)return;
  const b1=canonBrand(S.t1brand),b2=canonBrand(S.t2brand);
  const brand=is22&&b2&&b2!==b1?[b1,b2].filter(Boolean).join(' + '):(b1||null);
  const body={plate:S.plate,customerName:(S.cust&&S.cust.trim())||null,phone:(S.phone&&S.phone.trim())||null,
    size1:maskSize(S.t1size)||S.t1size,brand,size2:is22?(maskSize(S.t2size)||S.t2size):null,
    quantity:S.t1qty,rim:S.rim,threadDepth:S.thread,location:S.presetSpot||null};
  const res=await fetch('/api/intake',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json();
  if(res.ok){S.smsRec=data;S.smsOpen=true;renderModal();await loadStats();}
  else alert(data.error?.message||'Neizdevās saglabāt');}

// ============ INIT ============
(async function(){
  paintHeader();render();
  await Promise.all([loadStats(),loadActivity(),loadCustomers()]);
  render();
})();
</script>
